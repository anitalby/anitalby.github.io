<!DOCTYPE html>
<html>
<body style="background:#0f172a; color:white; text-align:center; font-family:Arial;">

<h1 style="color:#38bdf8;">Student Mark Calculator</h1>

<input id="m1" placeholder="Mark 1"><br><br>
<input id="m2" placeholder="Mark 2"><br><br>
<input id="m3" placeholder="Mark 3"><br><br>

<button onclick="calc()">Calculate</button>

<p id="res"></p>

<script>
function calc(){
let a = +m1.value || 0;
let b = +m2.value || 0;
let c = +m3.value || 0;

let total = a + b + c;
let avg = total / 3;

res.innerText = "Total: " + total + " | Average: " + avg;
}
</script>

</body>
</html>
